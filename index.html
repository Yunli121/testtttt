<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 工作時數管理</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e5f5 0%, #e1f5fe 100%);
            --accent-color: #e1bee7; 
            --warning-color: #fffde7; 
            --border-style: 2.2px solid #4a148c;
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary-text: #4a148c;
            --shadow: 8px 8px 0px #4a148c;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 導覽列 */
        nav {
            display: flex;
            background: #fff;
            border: var(--border-style);
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #4a148c;
        }

        nav button {
            padding: 10px 25px;
            border: none;
            background: white;
            font-weight: bold;
            color: var(--primary-text);
            cursor: pointer;
            transition: 0.2s;
        }

        nav button.active {
            background: var(--accent-color);
        }

        /* 頁面容器 */
        .page {
            display: none;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        .page.active {
            display: block;
        }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border: var(--border-style);
            box-shadow: var(--shadow);
            border-radius: 24px;
        }

        h2 { margin: 0 0 15px 0; text-align: center; color: var(--primary-text); }
        
        /* 輸入與統計 */
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #6a1b9a; }
        input, select {
            width: 100%; padding: 12px; box-sizing: border-box; border: var(--border-style);
            border-radius: 12px; font-size: 16px; outline: none; background: #fff;
        }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-box { background: var(--accent-color); border: var(--border-style); padding: 10px; border-radius: 15px; text-align: center; font-weight: bold; }
        .stat-box.highlight { background: var(--warning-color); }

        .btn-main {
            width: 100%; padding: 14px; background-color: #ffffff; border: var(--border-style);
            border-radius: 12px; font-weight: bold; font-size: 16px; color: var(--primary-text);
            cursor: pointer; box-shadow: 4px 4px 0px #4a148c; margin-bottom: 15px;
        }

        .btn-main:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #4a148c; }

        /* 日曆 */
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #fff;
            padding: 10px; border: var(--border-style); border-radius: 15px;
        }
        .calendar-day-head { font-size: 10px; font-weight: bold; text-align: center; color: #7b1fa2; }
        .calendar-cell {
            aspect-ratio: 1 / 1.3; border: 1px solid #eee; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; padding-top: 4px; font-size: 12px; cursor: pointer;
        }
        .calendar-cell.has-data { background-color: #f3e5f5; border-color: var(--primary-text); }
        .work-label { background: #4a148c; color: white; font-size: 9px; padding: 1px 3px; border-radius: 4px; margin-top: 4px; }

        /* 設定頁面特定樣式 */
        .setting-item {
            border-bottom: 1.5px dashed #4a148c; padding: 15px 0;
        }
        .setting-item:last-child { border-bottom: none; }
        .btn-setting {
            width: 100%; padding: 10px; margin-top: 8px; background: #fff; border: 1.5px solid #4a148c;
            border-radius: 10px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <button id="btn-work" class="active" onclick="showPage('work')">🕒 時數紀錄</button>
        <button id="btn-config" onclick="showPage('config')">⚙️ 設定備份</button>
    </nav>

    <!-- 第一頁：工作時數 -->
    <div id="page-work" class="page active">
        <div class="container">
            <h2>時數管理</h2>
            
            <div class="input-group">
                <label>💜 今日時數</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="dailyHour" placeholder="時" style="flex:1">
                    <input type="number" id="dailyMin" placeholder="分" style="flex:1">
                </div>
            </div>

            <button class="btn-main" onclick="addRecord()">💾 儲存今日紀錄</button>

            <div class="stats-container">
                <div class="stat-box highlight">
                    <span style="font-size: 12px;">本期剩餘</span><br>
                    <span id="sessionGap">0</span> hr
                </div>
                <div class="stat-box">
                    <span style="font-size: 12px;">本期累計</span><br>
                    <span id="sessionTotal">0</span> hr
                </div>
            </div>

            <div class="input-group">
                <label>🔍 月份查看</label>
                <select id="monthFilter" onchange="renderAll()"></select>
            </div>

            <div id="calendarGrid" class="calendar-grid"></div>
        </div>
    </div>

    <!-- 第二頁：設定 -->
    <div id="page-config" class="page">
        <div class="container">
            <h2>系統設定</h2>

            <div class="setting-item">
                <label>🎯 本週期目標時數 (hr)</label>
                <input type="number" id="goalInput" value="38" oninput="renderAll()">
            </div>

            <div class="setting-item">
                <label>📤 資料備份</label>
                <p style="font-size: 11px; color: #666;">將紀錄下載成檔案，避免清理瀏覽器後資料遺失。</p>
                <button class="btn-setting" onclick="exportData()">點此匯出備份檔案 (.json)</button>
            </div>

            <div class="setting-item">
                <label>📥 資料還原</label>
                <p style="font-size: 11px; color: #666;">選擇之前備份的檔案來還原所有時數紀錄。</p>
                <button class="btn-setting" onclick="document.getElementById('importFile').click()">點此選擇檔案並匯入</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </div>

            <div class="setting-item">
                <label>🏁 週期結算</label>
                <p style="font-size: 11px; color: #d63031;">領完薪水後按下，累計時數會重新歸零 (支援跨月)。</p>
                <button class="btn-setting" style="border-color: #d63031; color: #d63031;" onclick="settleAndReset()">完成本期結算 (統計歸零)</button>
            </div>
        </div>
    </div>

<script>
    let records = JSON.parse(localStorage.getItem('workRecords')) || [];
    let lastSettleTime = parseInt(localStorage.getItem('lastSettleTime')) || 0;

    // 分頁切換
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('btn-' + (pageId === 'work' ? 'work' : 'config')).classList.add('active');
        renderAll();
    }

    // 初始化月份
    function initMonthFilter() {
        const select = document.getElementById('monthFilter');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const val = `${d.getFullYear()}-${d.getMonth() + 1}`;
            select.add(new Option(`${d.getFullYear()}年 ${d.getMonth() + 1}月`, val));
        }
    }

    // 核心功能：新增紀錄
    function addRecord() {
        const h = parseFloat(document.getElementById('dailyHour').value) || 0;
        const min = parseFloat(document.getElementById('dailyMin').value) || 0;
        const total = h + (min / 60);
        if (total <= 0) return;
        const now = new Date();
        records.unshift({ id: Date.now(), year: now.getFullYear(), month: now.getMonth()+1, day: now.getDate(), hours: total });
        saveToStorage();
        document.getElementById('dailyHour').value = "";
        document.getElementById('dailyMin').value = "";
        renderAll();
    }

    // 結算
    function settleAndReset() {
        if (confirm("結算後週期統計會歸零，但月曆紀錄會保留，確定嗎？")) {
            lastSettleTime = Date.now();
            localStorage.setItem('lastSettleTime', lastSettleTime);
            renderAll();
        }
    }

    // 匯出
    function exportData() {
        const data = { records, lastSettleTime, goal: document.getElementById('goalInput').value };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `時數備份_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    // 匯入
    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = JSON.parse(event.target.result);
            records = data.records || [];
            lastSettleTime = data.lastSettleTime || 0;
            document.getElementById('goalInput').value = data.goal || 38;
            saveToStorage();
            localStorage.setItem('lastSettleTime', lastSettleTime);
            alert("匯入成功！");
            showPage('work');
        };
        reader.readAsText(file);
    }

    function saveToStorage() {
        localStorage.setItem('workRecords', JSON.stringify(records));
        localStorage.setItem('workGoal', document.getElementById('goalInput').value);
    }

    function renderAll() {
        const goal = parseFloat(document.getElementById('goalInput').value) || 38;
        const [year, month] = document.getElementById('monthFilter').value.split('-').map(Number);
        
        let sessionTotal = 0;
        records.forEach(r => { if (r.id >= lastSettleTime) sessionTotal += r.hours; });
        document.getElementById('sessionTotal').innerText = sessionTotal.toFixed(1);
        document.getElementById('sessionGap').innerText = Math.max(0, goal - sessionTotal).toFixed(1);

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        ['日', '一', '二', '三', '四', '五', '六'].forEach(w => {
            const h = document.createElement('div'); h.className = 'calendar-day-head'; h.innerText = w;
            grid.appendChild(h);
        });

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div'); cell.className = 'calendar-cell';
            const dayRecords = records.filter(r => r.year === year && r.month === month && r.day === i);
            if (dayRecords.length > 0) {
                cell.classList.add('has-data');
                const sum = dayRecords.reduce((s, r) => s + r.hours, 0);
                cell.innerHTML = `<span>${i}</span><div class="work-label">${sum.toFixed(1)}h</div>`;
            } else { cell.innerHTML = `<span>${i}</span>`; }
            grid.appendChild(cell);
        }
    }

    initMonthFilter();
    if(localStorage.getItem('workGoal')) document.getElementById('goalInput').value = localStorage.getItem('workGoal');
    renderAll();
</script>
</body>
</html>
