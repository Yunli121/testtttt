<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💼 工作時數管理</title>

    <!-- Apple Web App 設定 -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10433/10433049.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="工作時數">

    <!-- 導入 Quicksand 字體 (設定 400 標準, 500 稍微紮實) -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e5f5 0%, #e1f5fe 100%);
            --accent-color: #e1bee7; 
            --warning-color: #fffde7; 
            --border-style: 2.2px solid #4a148c;
            --card-bg: rgba(255, 255, 255, 0.92);
            --primary-text: #4a148c;
            --shadow: 8px 8px 0px #4a148c;
        }

        body {
            /* 優先使用 Quicksand，中文接續系統黑體 */
            font-family: 'Quicksand', -apple-system, "PingFang TC", sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 讓字體線條更乾淨 */
            -webkit-font-smoothing: antialiased;
            font-weight: 400; 
        }

        .page { display: none; width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            border: var(--border-style);
            box-shadow: var(--shadow);
            border-radius: 24px;
            text-align: center;
        }

        h2 { 
            margin: 0 0 20px 0; 
            color: var(--primary-text); 
            font-size: 22px; 
            font-weight: 500; /* 保持乾淨不粗 */
            letter-spacing: 0.5px;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 14px; color: #6a1b9a; }

        input, select {
            width: 100%; padding: 12px; box-sizing: border-box; border: var(--border-style);
            border-radius: 12px; font-size: 16px; outline: none; background: #fff;
            font-family: inherit;
        }

        .progress-section {
            background: rgba(255, 255, 255, 0.4); border: var(--border-style);
            border-radius: 18px; padding: 15px; margin-bottom: 15px;
        }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .stat-box { 
            background: var(--accent-color); 
            border: var(--border-style); 
            padding: 12px; 
            border-radius: 14px; 
            font-weight: 500; 
        }
        /* 數字的部分稍微加強一點點辨識度 */
        .stat-box span { font-weight: 500; font-size: 20px; }

        .btn-main {
            width: 100%; padding: 14px; background-color: #ffffff; border: var(--border-style);
            border-radius: 12px; font-weight: 500; font-size: 16px; color: var(--primary-text);
            cursor: pointer; box-shadow: 4px 4px 0px #4a148c; margin-bottom: 12px;
            font-family: inherit;
        }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #4a148c; }

        .btn-settle {
            width: 100%; padding: 10px; background-color: transparent; border: 1.5px dashed #4a148c;
            border-radius: 10px; font-size: 13px; color: #4a148c; cursor: pointer; margin-bottom: 25px;
            font-family: inherit;
        }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #fff;
            padding: 10px; border: var(--border-style); border-radius: 15px;
        }
        .calendar-day-head { font-size: 11px; font-weight: 500; color: #7b1fa2; padding-bottom: 5px; }
        .calendar-cell {
            aspect-ratio: 1 / 1.2; border: 1px solid #f2f2f2; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; padding-top: 4px;
            font-size: 12px; cursor: pointer;
        }
        .calendar-cell.has-data { background-color: #f3e5f5; border: 1.5px solid #4a148c; }
        .date-num { color: #888; font-family: 'Quicksand', sans-serif; }

        .work-label {
            background: #4a148c; color: white; font-size: 9px; padding: 1px 4px;
            border-radius: 4px; margin-top: 4px; font-family: 'Quicksand', sans-serif;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #fff; border-top: var(--border-style); display: flex;
            justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            flex: 1; height: 100%; background: none; border: none; font-weight: 500; 
            color: #bbb; cursor: pointer; font-size: 15px; display: flex;
            align-items: center; justify-content: center; font-family: inherit;
        }
        .nav-item.active { color: #4a148c; background: #f8f0fb; }
    </style>
</head>
<body>

    <div id="page-work" class="page active">
        <div class="container">
            <h2>📅 工作時數紀錄</h2>
            
            <div class="input-group">
                <label>目標時數 (hr)</label>
                <input type="number" id="goalInput" value="38" oninput="saveToStorage(); renderAll();">
            </div>

            <div class="input-group">
                <label>今日時數</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="dailyHour" placeholder="時" style="flex:1">
                    <input type="number" id="dailyMin" placeholder="分" style="flex:1">
                </div>
            </div>

            <button class="btn-main" onclick="addRecord()">💾 儲存時數 SAVE</button>

            <div class="progress-section">
                <div class="stats-container">
                    <div class="stat-box highlight">剩餘 <span id="sessionGap">0</span> hr</div>
                    <div class="stat-box">累計 <span id="sessionTotal">0</span> hr</div>
                </div>
            </div>

            <button class="btn-settle" onclick="settleAndReset()">🏁 完成本期結算</button>

            <div class="input-group">
                <label>歷史查詢</label>
                <div style="display: flex; gap: 8px;">
                    <select id="yearSelect" onchange="renderAll()">
                        <option value="2026">2026 年</option>
                        <option value="2027">2027 年</option>
                    </select>
                    <select id="monthSelect" onchange="renderAll()"></select>
                </div>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <!-- 底部導覽 -->
    <div class="bottom-nav">
        <button id="nav-work" class="nav-item active" onclick="showPage('work')">💼 時數</button>
        <button id="nav-config" class="nav-item" onclick="showPage('config')">⚙️ 設定</button>
    </div>

    <!-- (其餘 JS 邏輯不變) -->
    <script>
        // 這裡維持你原本的 JavaScript 邏輯即可...
    </script>
</body>
</html>
