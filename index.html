<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💼 工作時數管理</title>

    <!-- Apple Web App 設定 -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10433/10433049.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="工作時數">

    <style>
        :root {
            --bg-color: #f3e5f5;
            --accent-blue: #e1f5fe;
            --border-val: 2.2px solid #000; /* 你最愛的 Neubrutalism 粗線條 */
            --card-bg: #fff;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 30px;
            background: var(--card-bg);
            border: var(--border-val);
            box-shadow: 8px 8px 0px #000;
            padding: 20px;
            border-radius: 15px;
        }

        /* 底部導覽：固定在最下，不要懸浮 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #fff;
            border-top: var(--border-val);
            display: flex;
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            border: none;
            background: none;
            font-size: 18px;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item.active {
            background-color: var(--accent-blue);
        }

        /* 歷史回顧：年份月份分開 */
        .filter-row {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        
        select, input {
            flex: 1;
            padding: 10px;
            border: var(--border-val);
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: #fff;
            border: var(--border-val);
            box-shadow: 4px 4px 0px #000;
            font-weight: 900;
            margin: 15px 0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 10px;
        }

        .calendar-cell {
            border: 1px solid #000;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .has-data { background-color: var(--accent-blue); border: var(--border-val); }
    </style>
</head>
<body>

    <div class="container">
        <h2>💼 工作時數紀錄</h2>
        <div class="filter-row">
            <select id="yearSelect"><option value="2026">2026</option><option value="2027">2027</option></select>
            <select id="monthSelect"></select>
        </div>
        <button class="btn-main">💾 儲存時數 SAVE</button>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active">💼 時數</button>
        <button class="nav-item">⚙️ 設定</button>
    </div>

    <script>
        // 初始化月份
        const mSelect = document.getElementById('monthSelect');
        for (let i = 1; i <= 12; i++) mSelect.add(new Option(i + ' 月', i));
        mSelect.value = new Date().getMonth() + 1;
    </script>
</body>
</html>
