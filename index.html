<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 工作時數管理</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e5f5 0%, #e1f5fe 100%);
            --accent-color: #e1bee7; 
            --warning-color: #fffde7; 
            --border-style: 2.2px solid #4a148c;
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary-text: #4a148c;
            --shadow: 6px 6px 0px #4a148c;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding-bottom: 80px; /* 為底部導覽留空間 */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .page { display: none; width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        .container {
            background: var(--card-bg);
            padding: 20px;
            border: var(--border-style);
            box-shadow: var(--shadow);
            border-radius: 24px;
        }

        h2 { margin: 0 0 15px 0; text-align: center; color: var(--primary-text); font-size: 20px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #6a1b9a; }
        input, select {
            width: 100%; padding: 10px; box-sizing: border-box; border: var(--border-style);
            border-radius: 12px; font-size: 16px; outline: none; background: #fff;
        }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-box { background: var(--accent-color); border: var(--border-style); padding: 10px; border-radius: 15px; text-align: center; font-weight: bold; }
        .stat-box.highlight { background: var(--warning-color); }

        .btn-main {
            width: 100%; padding: 12px; background-color: #ffffff; border: var(--border-style);
            border-radius: 12px; font-weight: bold; font-size: 16px; color: var(--primary-text);
            cursor: pointer; box-shadow: 4px 4px 0px #4a148c; margin-bottom: 10px;
        }

        /* 日曆 */
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: #fff;
            padding: 8px; border: var(--border-style); border-radius: 15px; margin-top: 10px;
        }
        .calendar-day-head { font-size: 10px; font-weight: bold; text-align: center; color: #7b1fa2; }
        .calendar-cell {
            aspect-ratio: 1 / 1.2; border: 1px solid #eee; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; padding-top: 2px; font-size: 11px; cursor: pointer;
        }
        .calendar-cell.has-data { background-color: #f3e5f5; border-color: var(--primary-text); }
        .work-label { background: #4a148c; color: white; font-size: 8px; padding: 1px 2px; border-radius: 3px; margin-top: 2px; }

        /* 底部導覽 */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 450px;
            background: #fff; border-top: var(--border-style);
            display: flex; justify-content: space-around; padding: 10px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1); z-index: 100;
        }
        .nav-item {
            background: none; border: none; font-weight: bold; color: #999; cursor: pointer; font-size: 14px;
        }
        .nav-item.active { color: var(--primary-text); transform: scale(1.1); }

        /* 紀錄清單 (編輯/刪除) */
        .record-list { margin-top: 15px; text-align: left; }
        .record-item {
            background: #fff; border: 1.5px solid #4a148c; border-radius: 10px;
            padding: 8px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-del { color: #d63031; border: none; background: none; font-weight: bold; cursor: pointer; }

        .setting-card { background: #fff; border: var(--border-style); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- 第一頁：工作時數 -->
    <div id="page-work" class="page active">
        <div class="container">
            <h2>🕒 時數管理</h2>
            
            <div class="input-group">
                <label>🎯 本週期目標時數 (hr)</label>
                <input type="number" id="goalInput" value="38" oninput="renderAll()">
            </div>

            <div class="input-group">
                <label>💜 今日時數</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="dailyHour" placeholder="時" style="flex:1">
                    <input type="number" id="dailyMin" placeholder="分" style="flex:1">
                </div>
            </div>

            <button class="btn-main" onclick="addRecord()">💾 儲存今日紀錄</button>

            <div class="stats-container">
                <div class="stat-box highlight">
                    <span style="font-size: 12px;">還差多少</span><br>
                    <span id="sessionGap">0</span> hr
                </div>
                <div class="stat-box">
                    <span style="font-size: 12px;">週期累計</span><br>
                    <span id="sessionTotal">0</span> hr
                </div>
            </div>

            <div class="input-group">
                <label>🔍 查看月份紀錄 (點擊日期可修改)</label>
                <select id="monthFilter" onchange="renderAll()"></select>
            </div>

            <div id="calendarGrid" class="calendar-grid"></div>

            <div id="dayDetail" class="record-list"></div>
        </div>
    </div>

    <!-- 第二頁：設定 -->
    <div id="page-config" class="page">
        <div class="container">
            <h2>⚙️ 系統設定</h2>

            <div class="setting-card">
                <label>📤 資料備份</label>
                <button class="btn-main" style="font-size:14px;" onclick="exportData()">匯出備份檔 (.json)</button>
            </div>

            <div class="setting-card">
                <label>📥 資料還原</label>
                <button class="btn-main" style="font-size:14px;" onclick="document.getElementById('importFile').click()">選擇備份檔匯入</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </div>

            <div class="setting-card">
                <label>🏁 週期結算</label>
                <p style="font-size: 11px; color: #d63031;">領薪後按下，累計時數會歸零，但日曆紀錄會保留。</p>
                <button class="btn-main" style="border-color: #d63031; color: #d63031;" onclick="settleAndReset()">完成結算</button>
            </div>
        </div>
    </div>

    <!-- 底部導覽列 -->
    <div class="bottom-nav">
        <button id="nav-work" class="nav-item active" onclick="showPage('work')">🕒 時數紀錄</button>
        <button id="nav-config" class="nav-item" onclick="showPage('config')">⚙️ 設定</button>
    </div>

<script>
    let records = JSON.parse(localStorage.getItem('workRecords')) || [];
    let lastSettleTime = parseInt(localStorage.getItem('lastSettleTime')) || 0;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
        renderAll();
    }

    function initMonthFilter() {
        const select = document.getElementById('monthFilter');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const val = `${d.getFullYear()}-${d.getMonth() + 1}`;
            select.add(new Option(`${d.getFullYear()}年 ${d.getMonth() + 1}月`, val));
        }
    }

    function addRecord() {
        const h = parseFloat(document.getElementById('dailyHour').value) || 0;
        const min = parseFloat(document.getElementById('dailyMin').value) || 0;
        const total = h + (min / 60);
        if (total <= 0) return;
        const now = new Date();
        records.unshift({ id: Date.now(), year: now.getFullYear(), month: now.getMonth()+1, day: now.getDate(), hours: total });
        saveToStorage();
        document.getElementById('dailyHour').value = "";
        document.getElementById('dailyMin').value = "";
        renderAll();
    }

    function deleteRecord(id) {
        if(confirm("確定刪除這筆紀錄嗎？")) {
            records = records.filter(r => r.id !== id);
            saveToStorage();
            renderAll();
        }
    }

    function editRecord(id) {
        const record = records.find(r => r.id === id);
        const newVal = prompt(`修改 ${record.month}/${record.day} 的時數：`, record.hours.toFixed(1));
        if (newVal && !isNaN(newVal)) {
            record.hours = parseFloat(newVal);
            saveToStorage();
            renderAll();
        }
    }

    function settleAndReset() {
        if (confirm("確定結算嗎？統計將重新開始，但歷史紀錄不會消失。")) {
            lastSettleTime = Date.now();
            localStorage.setItem('lastSettleTime', lastSettleTime);
            renderAll();
        }
    }

    function exportData() {
        const data = { records, lastSettleTime, goal: document.getElementById('goalInput').value };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `時數備份_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = JSON.parse(event.target.result);
            records = data.records || [];
            lastSettleTime = data.lastSettleTime || 0;
            document.getElementById('goalInput').value = data.goal || 38;
            saveToStorage();
            localStorage.setItem('lastSettleTime', lastSettleTime);
            alert("匯入成功！");
            showPage('work');
        };
        reader.readAsText(file);
    }

    function saveToStorage() {
        localStorage.setItem('workRecords', JSON.stringify(records));
        localStorage.setItem('workGoal', document.getElementById('goalInput').value);
    }

    function renderAll() {
        const goal = parseFloat(document.getElementById('goalInput').value) || 38;
        const [year, month] = document.getElementById('monthFilter').value.split('-').map(Number);
        
        let sessionTotal = 0;
        records.forEach(r => { if (r.id >= lastSettleTime) sessionTotal += r.hours; });
        document.getElementById('sessionTotal').innerText = sessionTotal.toFixed(1);
        document.getElementById('sessionGap').innerText = Math.max(0, goal - sessionTotal).toFixed(1);

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        ['日', '一', '二', '三', '四', '五', '六'].forEach(w => {
            const h = document.createElement('div'); h.className = 'calendar-day-head'; h.innerText = w;
            grid.appendChild(h);
        });

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        
        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div'); cell.className = 'calendar-cell';
            const dayRecords = records.filter(r => r.year === year && r.month === month && r.day === i);
            if (dayRecords.length > 0) {
                cell.classList.add('has-data');
                const sum = dayRecords.reduce((s, r) => s + r.hours, 0);
                cell.innerHTML = `<span>${i}</span><div class="work-label">${sum.toFixed(1)}h</div>`;
                cell.onclick = () => showDayDetail(year, month, i);
            } else { 
                cell.innerHTML = `<span>${i}</span>`; 
                cell.onclick = () => {
                    const val = prompt(`補記 ${month}/${i} 的時數：`);
                    if(val && !isNaN(val)) {
                        records.unshift({ id: Date.now(), year, month, day: i, hours: parseFloat(val) });
                        saveToStorage(); renderAll();
                    }
                };
            }
            grid.appendChild(cell);
        }
    }

    function showDayDetail(y, m, d) {
        const dayRecords = records.filter(r => r.year === y && r.month === m && r.day === d);
        const detailDiv = document.getElementById('dayDetail');
        detailDiv.innerHTML = `<strong>📍 ${m}/${d} 詳細紀錄：</strong>`;
        dayRecords.forEach(r => {
            const item = document.createElement('div');
            item.className = 'record-item';
            item.innerHTML = `
                <span onclick="editRecord(${r.id})">🕒 ${r.hours.toFixed(1)} 小時 (點擊修改)</span>
                <button class="btn-del" onclick="deleteRecord(${r.id})">刪除</button>
            `;
            detailDiv.appendChild(item);
        });
    }

    initMonthFilter();
    if(localStorage.getItem('workGoal')) document.getElementById('goalInput').value = localStorage.getItem('workGoal');
    renderAll();
</script>
</body>
</html>
