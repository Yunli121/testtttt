<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 工作時數管理</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e5f5 0%, #e1f5fe 100%);
            --accent-color: #e1bee7; 
            --warning-color: #fffde7; 
            --border-style: 2.2px solid #000;
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary-text: #000;
            --shadow: 8px 8px 0px #000;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .page { display: none; width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border: var(--border-style);
            box-shadow: var(--shadow);
            border-radius: 24px;
            text-align: center;
        }

        h2 { margin: 0 0 20px 0; color: var(--primary-text); font-size: 24px; font-weight: 900; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: 900; margin-bottom: 8px; font-size: 14px; }
        
        input, select {
            width: 100%; padding: 12px; box-sizing: border-box; border: var(--border-style);
            border-radius: 12px; font-size: 16px; outline: none; background: #fff; font-weight: bold;
        }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-box { background: var(--accent-color); border: var(--border-style); padding: 15px; border-radius: 18px; font-weight: 900; }
        .stat-box.highlight { background: var(--warning-color); }

        .btn-main {
            width: 100%; padding: 16px; background-color: #fff; border: var(--border-style);
            border-radius: 14px; font-weight: 900; font-size: 18px; color: #000;
            cursor: pointer; box-shadow: 5px 5px 0px #000; margin-bottom: 15px;
        }
        .btn-main:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px #000; }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; background: #fff;
            padding: 12px; border: var(--border-style); border-radius: 18px; margin-top: 15px;
        }
        .calendar-day-head { font-size: 12px; font-weight: 900; color: #000; padding-bottom: 8px; }
        .calendar-cell {
            aspect-ratio: 1 / 1.3; border: 1.5px solid #eee; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; font-weight: bold;
        }
        .calendar-cell.has-data { background-color: var(--accent-color); border: var(--border-style); }
        .work-label { background: #000; color: #fff; font-size: 10px; padding: 2px 4px; border-radius: 5px; margin-top: 4px; }

        .bottom-nav {
            position: fixed; bottom: 25px; width: 90%; max-width: 400px;
            background: #fff; border: var(--border-style); border-radius: 50px;
            display: flex; justify-content: space-around; padding: 15px 0;
            box-shadow: 8px 8px 0px #000; z-index: 100;
        }
        .nav-item { background: none; border: none; font-weight: 900; color: #aaa; cursor: pointer; font-size: 16px; }
        .nav-item.active { color: #000; text-decoration: underline; text-underline-offset: 6px; }

        .setting-section { border-bottom: 2px dashed #000; padding: 20px 0; text-align: left; }
    </style>
</head>
<body>

    <div id="page-work" class="page active">
        <div class="container">
            <h2>💼 WORK LOG</h2>
            
            <div class="input-group">
                <label>🎯 目標時數 (GOAL)</label>
                <input type="number" id="goalInput" value="38" oninput="saveToStorage(); renderAll();">
            </div>

            <div class="input-group">
                <label>💜 新增今日時數</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="dailyHour" placeholder="時" style="flex:1">
                    <input type="number" id="dailyMin" placeholder="分" style="flex:1">
                </div>
            </div>

            <button class="btn-main" onclick="addRecord()">儲存紀錄 SAVE 💾</button>

            <div class="stats-container">
                <div class="stat-box highlight">
                    <div style="font-size: 11px;">剩餘 GAP</div>
                    <span id="sessionGap" style="font-size: 20px;">0</span> hr
                </div>
                <div class="stat-box">
                    <div style="font-size: 11px;">累計 TOTAL</div>
                    <span id="sessionTotal" style="font-size: 20px;">0</span> hr
                </div>
            </div>

            <div class="input-group">
                <select id="monthFilter" onchange="renderAll()"></select>
            </div>

            <div id="calendarGrid" class="calendar-grid"></div>
        </div>
    </div>

    <div id="page-config" class="page">
        <div class="container">
            <h2>⚙️ SETTINGS</h2>
            <div class="setting-section">
                <label>📤 備份資料 (Export)</label>
                <button class="btn-main" onclick="exportData()">匯出 .JSON 檔案</button>
            </div>
            <div class="setting-section">
                <label>📥 還原資料 (Import)</label>
                <button class="btn-main" onclick="document.getElementById('importFile').click()">選擇檔案並匯入</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </div>
            <div class="setting-section">
                <label>🏁 週期結算</label>
                <button class="btn-main" style="background:#ffda79;" onclick="settleAndReset()">完成結算 (統計歸零)</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="nav-work" class="nav-item active" onclick="showPage('work')">LOGS</button>
        <button id="nav-config" class="nav-item" onclick="showPage('config')">CONFIG</button>
    </div>

<script>
    let records = JSON.parse(localStorage.getItem('workRecords')) || [];
    let lastSettleTime = parseInt(localStorage.getItem('lastSettleTime')) || 0;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
        renderAll();
    }

    function initMonthFilter() {
        const select = document.getElementById('monthFilter');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            select.add(new Option(`${d.getFullYear()} 年 ${d.getMonth() + 1} 月`, `${d.getFullYear()}-${d.getMonth() + 1}`));
        }
    }

    function addRecord() {
        const h = parseFloat(document.getElementById('dailyHour').value) || 0;
        const min = parseFloat(document.getElementById('dailyMin').value) || 0;
        const total = h + (min / 60);
        if (total <= 0) return;
        records.unshift({ id: Date.now(), year: new Date().getFullYear(), month: new Date().getMonth()+1, day: new Date().getDate(), hours: total });
        saveToStorage();
        document.getElementById('dailyHour').value = "";
        document.getElementById('dailyMin').value = "";
        renderAll();
    }

    // 核心修改：將時數改為 0 等於移除該日紀錄
    function modifyDay(year, month, day) {
        const dayRecords = records.filter(r => r.year === year && r.month === month && r.day === day);
        const currentTotal = dayRecords.reduce((s, r) => s + r.hours, 0);
        const newVal = prompt(`修改 ${month}/${day} 的工時 (輸入 0 則清除紀錄)：`, currentTotal.toFixed(1));
        
        if (newVal !== null && !isNaN(newVal)) {
            const parsedVal = parseFloat(newVal);
            // 先移除該天所有舊紀錄
            records = records.filter(r => !(r.year === year && r.month === month && r.day === day));
            
            // 如果輸入大於 0，則新增一筆整合後的紀錄
            if (parsedVal > 0) {
                records.unshift({ id: Date.now(), year, month, day, hours: parsedVal });
            }
            saveToStorage();
            renderAll();
        }
    }

    function saveToStorage() {
        localStorage.setItem('workRecords', JSON.stringify(records));
        localStorage.setItem('workGoal', document.getElementById('goalInput').value);
    }

    function renderAll() {
        const goal = parseFloat(document.getElementById('goalInput').value) || 38;
        const filterVal = document.getElementById('monthFilter').value || `${new Date().getFullYear()}-${new Date().getMonth() + 1}`;
        const [year, month] = filterVal.split('-').map(Number);
        
        let sessionTotal = 0;
        records.forEach(r => { if (r.id >= lastSettleTime) sessionTotal += r.hours; });
        document.getElementById('sessionTotal').innerText = sessionTotal.toFixed(1);
        document.getElementById('sessionGap').innerText = Math.max(0, goal - sessionTotal).toFixed(1);

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        ['日', '一', '二', '三', '四', '五', '六'].forEach(w => {
            const h = document.createElement('div'); h.className = 'calendar-day-head'; h.innerText = w;
            grid.appendChild(h);
        });

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        
        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div'); cell.className = 'calendar-cell';
            const dayRecords = records.filter(r => r.year === year && r.month === month && r.day === i);
            if (dayRecords.length > 0) {
                cell.classList.add('has-data');
                const sum = dayRecords.reduce((s, r) => s + r.hours, 0);
                cell.innerHTML = `<span>${i}</span><div class="work-label">${sum.toFixed(1)}h</div>`;
            } else { cell.innerHTML = `<span>${i}</span>`; }
            cell.onclick = () => modifyDay(year, month, i);
            grid.appendChild(cell);
        }
    }

    function settleAndReset() {
        if (confirm("結算完成後本期統計會歸零，確定嗎？")) {
            lastSettleTime = Date.now();
            localStorage.setItem('lastSettleTime', lastSettleTime);
            renderAll();
        }
    }

    function exportData() {
        const data = { records, lastSettleTime, goal: document.getElementById('goalInput').value };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `WorkBackup_${new Date().toLocaleDateString()}.json`; a.click();
    }

    function importData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = JSON.parse(event.target.result);
            records = data.records || []; lastSettleTime = data.lastSettleTime || 0;
            document.getElementById('goalInput').value = data.goal || 38;
            saveToStorage(); renderAll(); alert("還原成功！");
        };
        reader.readAsText(file);
    }

    initMonthFilter();
    if(localStorage.getItem('workGoal')) document.getElementById('goalInput').value = localStorage.getItem('workGoal');
    renderAll();
</script>
</body>
</html>
