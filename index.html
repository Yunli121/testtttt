<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💼 工作時數管理</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10433/10433049.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="工作時數">

    <!-- 導入思源黑體 500 字重 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e5f5 0%, #e1f5fe 100%);
            --accent-color: #e1bee7; 
            --warning-color: #fffde7; 
            --border-style: 2.2px solid #4a148c;
            --card-bg: rgba(255, 255, 255, 0.9);
            --primary-text: #4a148c;
            --shadow: 8px 8px 0px #4a148c;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            font-weight: 500;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .page { display: none; width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            border: var(--border-style);
            box-shadow: var(--shadow);
            border-radius: 24px;
            text-align: center;
        }

        h2 { margin: 0 0 15px 0; color: var(--primary-text); font-size: 22px; font-weight: 500; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #6a1b9a; font-weight: 500; }

        input, select {
            width: 100%; padding: 10px; box-sizing: border-box; border: var(--border-style);
            border-radius: 12px; font-size: 16px; outline: none; background: #fff; font-family: inherit; font-weight: 500;
        }

        .progress-section {
            background: rgba(255, 255, 255, 0.5); border: var(--border-style);
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
        }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: var(--accent-color); border: var(--border-style); padding: 12px; border-radius: 15px; color: var(--primary-text); }
        .stat-box.highlight { background: var(--warning-color); }

        .btn-main {
            width: 100%; padding: 14px; background-color: #ffffff; border: var(--border-style);
            border-radius: 12px; font-weight: 500; font-size: 16px; color: var(--primary-text);
            cursor: pointer; box-shadow: 5px 5px 0px #4a148c; margin-bottom: 12px; font-family: inherit;
        }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #4a148c; }

        .btn-settle {
            width: 100%; padding: 10px; background-color: #f3e5f5; border: 1.5px dashed #4a148c;
            border-radius: 10px; font-size: 13px; color: #4a148c; cursor: pointer; margin-bottom: 20px; font-family: inherit; font-weight: 500;
        }

        /* 小提醒文字樣式 */
        .hint-text {
            font-size: 13px;
            color: #7b1fa2;
            margin: 10px 0;
            text-align: left;
            font-weight: 500;
            display: block;
        }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #fff;
            padding: 10px; border: var(--border-style); border-radius: 15px;
        }
        .calendar-day-head { font-size: 10px; font-weight: 500; color: #7b1fa2; padding-bottom: 5px; }
        .calendar-cell {
            aspect-ratio: 1 / 1.3; border: 1px solid #eee; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; padding-top: 4px;
            font-size: 12px; cursor: pointer; font-weight: 500;
        }
        .calendar-cell.has-data { background-color: #f3e5f5; border: 1.5px solid #4a148c; }
        .date-num { color: #999; }
        .has-data .date-num { color: #4a148c; font-weight: 500; }

        .work-label {
            background: #4a148c; color: white; font-size: 9px; padding: 1px 3px;
            border-radius: 4px; margin-top: 4px; max-width: 90%;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #fff; border-top: var(--border-style); display: flex;
            justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            flex: 1; height: 100%; background: none; border: none; font-weight: 500; 
            color: #aaa; cursor: pointer; font-size: 16px; display: flex;
            align-items: center; justify-content: center; font-family: inherit;
        }
        .nav-item.active { color: #4a148c; background: #f3e5f5; }
    </style>
</head>
<body>

    <div id="page-work" class="page active">
        <div class="container">
            <h2>📅 工作時數紀錄</h2>
            <div class="input-group">
                <label>💪🏻 目標時數 (hr)</label>
                <input type="number" id="goalInput" oninput="saveToStorage(); renderAll();">
            </div>
            <div class="input-group">
                <label>💜 今日時數</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="dailyHour" placeholder="時" style="flex:1">
                    <input type="number" id="dailyMin" placeholder="分" style="flex:1">
                </div>
            </div>
            <button class="btn-main" onclick="addRecord()">💾 儲存時數 SAVE</button>
            
            <div class="progress-section">
                <div class="stats-container">
                    <div class="stat-box highlight">
                        <span style="font-size: 15px; opacity: 0.8; font-weight: 500;">目前剩餘</span><br>
                        <span id="sessionGap" style="font-size: 20px; font-weight: 500;">0</span> hr
                    </div>
                    <div class="stat-box">
                        <span style="font-size: 15px; opacity: 0.8; font-weight: 500;">目前累計</span><br>
                        <span id="sessionTotal" style="font-size: 20px; font-weight: 500;">0</span> hr
                    </div>
                </div>
            </div>

            <button class="btn-settle" onclick="settleAndReset()">🏁 完成本期結算</button>
            
            <div class="input-group">
                <label>🔍 歷史查詢</label>
                <div style="display: flex; gap: 8px; margin-top: 5px;">
                    <select id="yearSelect" onchange="renderAll()"></select>
                    <select id="monthSelect" onchange="renderAll()"></select>
                </div>
            </div>

            <span class="hint-text">💡 點擊日期可「補記」或「修改」</span>

            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <div id="page-config" class="page">
        <div class="container">
            <h2>⚙️ 備份與設定</h2>
            <div style="text-align: left; margin-bottom: 20px; border-bottom: 2px dashed #4a148c; padding-bottom: 15px;">
                <label>📤 備份資料 (Export)</label>
                <button class="btn-main" onclick="exportData()">匯出 .JSON 檔案</button>
            </div>
            <div style="text-align: left;">
                <label>📥 還原資料 (Import)</label>
                <button class="btn-main" onclick="document.getElementById('importFile').click()">選擇檔案匯入</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="nav-work" class="nav-item active" onclick="showPage('work')">💼 時數</button>
        <button id="nav-config" class="nav-item" onclick="showPage('config')">⚙️ 設定</button>
    </div>

<script>
    let records = JSON.parse(localStorage.getItem('workRecords')) || [];
    let lastSettleTime = parseInt(localStorage.getItem('lastSettleTime')) || 0;
    let savedGoal = localStorage.getItem('workGoal') || "38";

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
        renderAll();
    }

    function init() {
        const ySelect = document.getElementById('yearSelect');
        const mSelect = document.getElementById('monthSelect');
        const now = new Date();
        for (let y = 2025; y <= 2027; y++) ySelect.add(new Option(`${y} 年`, y));
        for (let i = 1; i <= 12; i++) mSelect.add(new Option(`${i} 月`, i));
        ySelect.value = now.getFullYear();
        mSelect.value = now.getMonth() + 1;
        document.getElementById('goalInput').value = savedGoal;
        renderAll();
    }

    function addRecord() {
        const h = parseFloat(document.getElementById('dailyHour').value) || 0;
        const min = parseFloat(document.getElementById('dailyMin').value) || 0;
        const total = h + (min / 60);
        if (total <= 0) return;
        const now = new Date();
        records.unshift({ id: Date.now(), year: now.getFullYear(), month: now.getMonth() + 1, day: now.getDate(), hours: total });
        saveToStorage();
        document.getElementById('dailyHour').value = "";
        document.getElementById('dailyMin').value = "";
        renderAll();
    }

    function renderAll() {
        const goal = parseFloat(document.getElementById('goalInput').value) || 0;
        const year = parseInt(document.getElementById('yearSelect').value);
        const month = parseInt(document.getElementById('monthSelect').value);
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";

        let currentTotal = 0;
        records.forEach(r => { if (r.id > lastSettleTime) currentTotal += r.hours; });
        document.getElementById('sessionTotal').innerText = currentTotal.toFixed(1);
        document.getElementById('sessionGap').innerText = Math.max(0, goal - currentTotal).toFixed(1);

        ['日', '一', '二', '三', '四', '五', '六'].forEach(w => {
            const h = document.createElement('div'); h.className = 'calendar-day-head'; h.innerText = w; grid.appendChild(h);
        });

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div'); cell.className = 'calendar-cell';
            const dayRecords = records.filter(r => r.year === year && r.month === month && r.day === i);
            if (dayRecords.length > 0) {
                cell.classList.add('has-data');
                const sum = dayRecords.reduce((s, r) => s + r.hours, 0);
                cell.innerHTML = `<span class="date-num">${i}</span><div class="work-label">${sum.toFixed(1)}h</div>`;
            } else { cell.innerHTML = `<span class="date-num">${i}</span>`; }
            cell.onclick = () => handleDateEdit(year, month, i, dayRecords);
            grid.appendChild(cell);
        }
    }

    function handleDateEdit(y, m, d, dayRecords) {
        const currentVal = dayRecords.reduce((s, r) => s + r.hours, 0).toFixed(1);
        const newVal = prompt(`修改 [ ${m}/${d} ] 時數：\n(輸入 0 可以刪除當日紀錄)`, currentVal);
        
        if (newVal !== null && !isNaN(newVal)) {
            // 先過濾掉當天所有紀錄
            records = records.filter(r => !(r.year === y && r.month === m && r.day === d));
            
            // 如果輸入大於 0 則新增一筆新的，如果輸入 0 則不新增（等同於刪除）
            if (parseFloat(newVal) > 0) {
                records.unshift({ id: Date.now(), year: y, month: m, day: d, hours: parseFloat(newVal) });
            }
            saveToStorage(); 
            renderAll();
        }
    }

    function settleAndReset() {
        if (confirm("確定本期結算？累計將歸零。")) {
            lastSettleTime = Date.now(); localStorage.setItem('lastSettleTime', lastSettleTime); renderAll();
        }
    }

    function saveToStorage() {
        localStorage.setItem('workRecords', JSON.stringify(records));
        localStorage.setItem('workGoal', document.getElementById('goalInput').value);
    }

    function exportData() {
        const data = { records, lastSettleTime, goal: document.getElementById('goalInput').value };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `WorkHours_Backup.json`; a.click();
    }

    function importData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const data = JSON.parse(event.target.result);
                records = data.records || []; lastSettleTime = data.lastSettleTime || 0;
                document.getElementById('goalInput').value = data.goal || 38;
                saveToStorage(); alert("還原成功！"); renderAll();
            } catch(e) { alert("檔案格式錯誤"); }
        };
        reader.readAsText(file);
    }

    window.onload = init;
</script>
</body>
</html>
