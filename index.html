<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 工作時數管理</title>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e5f5 0%, #e1f5fe 100%);
            --accent-color: #e1bee7; 
            --warning-color: #fffde7; 
            --border-style: 2.2px solid #4a148c;
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary-text: #4a148c;
            --shadow: 10px 10px 0px #4a148c;
        }

        body {
            font-family: -apple-system, "Helvetica Neue", sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border: var(--border-style);
            box-shadow: var(--shadow);
            border-radius: 24px;
            text-align: center;
        }

        h2 { margin: 0 0 15px 0; color: var(--primary-text); font-size: 22px; font-weight: 900; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #6a1b9a; }

        input, select {
            width: 100%; padding: 10px; box-sizing: border-box; border: var(--border-style);
            border-radius: 12px; font-size: 16px; outline: none; background: #fff; font-weight: bold;
        }

        .progress-section {
            background: rgba(255, 255, 255, 0.5); border: var(--border-style);
            border-radius: 20px; padding: 12px; margin-bottom: 12px;
        }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
        .stat-box { background: var(--accent-color); border: var(--border-style); padding: 10px; border-radius: 15px; font-weight: bold; }
        .stat-box.highlight { background: var(--warning-color); }

        .btn-main {
            width: 100%; padding: 14px; background-color: #ffffff; border: var(--border-style);
            border-radius: 12px; font-weight: 900; font-size: 16px; color: var(--primary-text);
            cursor: pointer; box-shadow: 5px 5px 0px #4a148c; margin-bottom: 12px;
        }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #4a148c; }

        .btn-settle {
            width: 100%; padding: 10px; background-color: #f3e5f5; border: 1.5px dashed #4a148c;
            border-radius: 10px; font-size: 13px; color: #4a148c; cursor: pointer; margin-bottom: 20px; font-weight: bold;
        }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #fff;
            padding: 10px; border: var(--border-style); border-radius: 15px;
        }
        .calendar-day-head { font-size: 10px; font-weight: bold; color: #7b1fa2; padding-bottom: 5px; }
        .calendar-cell {
            aspect-ratio: 1 / 1.3; border: 1px solid #eee; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; padding-top: 4px;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .calendar-cell:hover { background-color: #f8f0fb; border-color: #4a148c; }
        .calendar-cell.has-data { background-color: #f3e5f5; border: 1.5px solid #4a148c; }
        .date-num { color: #999; }
        .has-data .date-num { color: #4a148c; font-weight: bold; }

        .work-label {
            background: #4a148c; color: white; font-size: 9px; padding: 1px 3px;
            border-radius: 4px; margin-top: 4px; max-width: 90%;
        }

        .hint-text { font-size: 11px; color: #7b1fa2; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 工作時數管理</h2>
    
    <div class="input-group">
        <label>💪🏻 目標時數 (hr)</label>
        <input type="number" id="goalInput" value="38" oninput="saveToStorage(); renderAll();">
    </div>

    <div class="input-group">
        <label>💜 今日時數</label>
        <div style="display: flex; gap: 8px;">
            <input type="number" id="dailyHour" placeholder="時" style="flex:1">
            <input type="number" id="dailyMin" placeholder="分" style="flex:1">
        </div>
    </div>

    <button class="btn-main" onclick="addRecord()">💾 儲存時數 SAVE</button>

    <div class="progress-section">
        <div class="stats-container">
            <div class="stat-box highlight">
                <span style="font-size: 13px;">目前剩餘 GAP</span><br>
                <span id="sessionGap" style="font-size: 20px;">0</span> hr
            </div>
            <div class="stat-box">
                <span style="font-size: 13px;">目前累計 TOTAL</span><br>
                <span id="sessionTotal" style="font-size: 20px;">0</span> hr
            </div>
        </div>
    </div>

    <button class="btn-settle" onclick="settleAndReset()">🏁 完成本期結算 (統計歸零)</button>

    <div class="input-group" style="margin-bottom: 5px;">
        <label>🔍 歷史回顧</label>
        <select id="monthFilter" onchange="renderAll()"></select>
        <div class="hint-text">💡 點擊日期可修改時數 (輸入 0 可清除)</div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('workRecords')) || [];
    let lastSettleTime = parseInt(localStorage.getItem('lastSettleTime')) || 0;

    function initMonthFilter() {
        const select = document.getElementById('monthFilter');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            select.add(new Option(`${d.getFullYear()}年 ${d.getMonth() + 1}月`, `${d.getFullYear()}-${d.getMonth() + 1}`));
        }
    }

    function addRecord() {
        const h = parseFloat(document.getElementById('dailyHour').value) || 0;
        const min = parseFloat(document.getElementById('dailyMin').value) || 0;
        const total = h + (min / 60);
        if (total <= 0) return;

        const now = new Date();
        records.unshift({
            id: Date.now(),
            year: now.getFullYear(),
            month: now.getMonth() + 1,
            day: now.getDate(),
            hours: total
        });
        saveToStorage();
        document.getElementById('dailyHour').value = "";
        document.getElementById('dailyMin').value = "";
        renderAll();
    }

    // 核心修改：不刪除，只能修改數字
    function handleDateClick(y, m, d, dayRecords) {
        const currentTotal = dayRecords.reduce((s, r) => s + r.hours, 0).toFixed(1);
        const newVal = prompt(`修改 [ ${m}/${d} ] 的工時：\n(目前累計：${currentTotal} hr)\n輸入 0 可清除該日紀錄`, currentTotal);
        
        if (newVal !== null && !isNaN(newVal)) {
            const parsedVal = parseFloat(newVal);
            // 先過濾掉當天的舊紀錄
            records = records.filter(r => !(r.year === y && r.month === m && r.day === d));
            
            // 如果輸入大於 0 則新增一筆取代
            if (parsedVal > 0) {
                records.unshift({ id: Date.now(), year: y, month: m, day: d, hours: parsedVal });
            }
            saveToStorage();
            renderAll();
        }
    }

    function saveToStorage() {
        localStorage.setItem('workRecords', JSON.stringify(records));
        localStorage.setItem('workGoal', document.getElementById('goalInput').value);
    }

    function renderAll() {
        const goal = parseFloat(document.getElementById('goalInput').value) || 0;
        const [year, month] = document.getElementById('monthFilter').value.split('-').map(Number);
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";

        let sessionTotal = 0;
        records.forEach(r => { if (r.id > lastSettleTime) sessionTotal += r.hours; });
        document.getElementById('sessionTotal').innerText = sessionTotal.toFixed(1);
        document.getElementById('sessionGap').innerText = Math.max(0, goal - sessionTotal).toFixed(1);

        ['日', '一', '二', '三', '四', '五', '六'].forEach(w => {
            const h = document.createElement('div');
            h.className = 'calendar-day-head'; h.innerText = w;
            grid.appendChild(h);
        });

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            const dayRecords = records.filter(r => r.year === year && r.month === month && r.day === i);
            
            if (dayRecords.length > 0) {
                cell.classList.add('has-data');
                const sum = dayRecords.reduce((s, r) => s + r.hours, 0);
                cell.innerHTML = `<span class="date-num">${i}</span><div class="work-label">${sum.toFixed(1)}h</div>`;
            } else {
                cell.innerHTML = `<span class="date-num">${i}</span>`;
            }

            cell.onclick = () => handleDateClick(year, month, i, dayRecords);
            grid.appendChild(cell);
        }
    }

    function settleAndReset() {
        if (confirm("確定完成本期結算？累計時數將歸零重新計算。")) {
            lastSettleTime = Date.now();
            localStorage.setItem('lastSettleTime', lastSettleTime);
            renderAll();
        }
    }

    initMonthFilter();
    if(localStorage.getItem('workGoal')) document.getElementById('goalInput').value = localStorage.getItem('workGoal');
    renderAll();
</script>

</body>
</html>
