<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 工作時數管理</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e5f5 0%, #e1f5fe 100%);
            --accent-color: #e1bee7; 
            --warning-color: #fffde7; 
            --border-style: 2.2px solid #000; /* 回歸純黑粗線條無框感 */
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary-text: #000;
            --shadow: 6px 6px 0px #000;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .page { display: none; width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        .container {
            background: var(--card-bg);
            padding: 20px;
            border: var(--border-style);
            box-shadow: var(--shadow);
            border-radius: 20px;
        }

        h2 { margin: 0 0 15px 0; text-align: center; color: var(--primary-text); font-size: 22px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: 900; margin-bottom: 5px; font-size: 13px; color: #000; }
        input, select {
            width: 100%; padding: 12px; box-sizing: border-box; border: var(--border-style);
            border-radius: 10px; font-size: 16px; outline: none; background: #fff; font-weight: bold;
        }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .stat-box { background: var(--accent-color); border: var(--border-style); padding: 12px; border-radius: 12px; text-align: center; font-weight: 900; }
        .stat-box.highlight { background: var(--warning-color); }

        .btn-main {
            width: 100%; padding: 14px; background-color: #fff; border: var(--border-style);
            border-radius: 12px; font-weight: 900; font-size: 16px; color: #000;
            cursor: pointer; box-shadow: 4px 4px 0px #000; margin-bottom: 12px;
        }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: #fff;
            padding: 8px; border: var(--border-style); border-radius: 12px; margin-top: 10px;
        }
        .calendar-day-head { font-size: 11px; font-weight: 900; text-align: center; color: #000; padding-bottom: 5px; }
        .calendar-cell {
            aspect-ratio: 1 / 1.2; border: 1px solid #ddd; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; font-weight: bold;
        }
        .calendar-cell.has-data { background-color: var(--accent-color); border: var(--border-style); }
        .work-label { background: #000; color: #fff; font-size: 9px; padding: 1px 3px; border-radius: 3px; margin-top: 3px; }

        .bottom-nav {
            position: fixed; bottom: 20px; width: 90%; max-width: 400px;
            background: #fff; border: var(--border-style); border-radius: 50px;
            display: flex; justify-content: space-around; padding: 12px 0;
            box-shadow: 6px 6px 0px #000; z-index: 100;
        }
        .nav-item { background: none; border: none; font-weight: 900; color: #888; cursor: pointer; font-size: 14px; }
        .nav-item.active { color: #000; text-decoration: underline; text-underline-offset: 4px; }

        .record-list { margin-top: 20px; border-top: 2px dashed #000; padding-top: 15px; }
        .record-item {
            background: #fff; border: var(--border-style); border-radius: 8px;
            padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-weight: bold;
        }
        .btn-del { color: #ff0000; border: 1.5px solid #000; background: #fff; padding: 4px 8px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="page-work" class="page active">
        <div class="container">
            <h2>🕒 WORK HOURS</h2>
            
            <div class="input-group">
                <label>🎯 TARGET GOAL (hr)</label>
                <input type="number" id="goalInput" value="38" oninput="saveToStorage(); renderAll();">
            </div>

            <div class="input-group">
                <label>💜 ADD HOURS</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="dailyHour" placeholder="H" style="flex:1">
                    <input type="number" id="dailyMin" placeholder="M" style="flex:1">
                </div>
            </div>

            <button class="btn-main" onclick="addRecord()">SAVE RECORD 💾</button>

            <div class="stats-container">
                <div class="stat-box highlight">
                    <div style="font-size: 10px;">GAP</div>
                    <span id="sessionGap">0</span> hr
                </div>
                <div class="stat-box">
                    <div style="font-size: 10px;">TOTAL</div>
                    <span id="sessionTotal">0</span> hr
                </div>
            </div>

            <div class="input-group">
                <select id="monthFilter" onchange="renderAll()"></select>
            </div>

            <div id="calendarGrid" class="calendar-grid"></div>
            <div id="dayDetail" class="record-list"></div>
        </div>
    </div>

    <div id="page-config" class="page">
        <div class="container">
            <h2>⚙️ SETTINGS</h2>
            <div class="input-group">
                <label>📤 BACKUP DATA</label>
                <button class="btn-main" onclick="exportData()">EXPORT .JSON</button>
            </div>
            <div class="input-group">
                <label>📥 RESTORE DATA</label>
                <button class="btn-main" onclick="document.getElementById('importFile').click()">IMPORT .JSON</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </div>
            <div class="input-group" style="margin-top:20px;">
                <label>🏁 RESET SESSION</label>
                <button class="btn-main" style="background:#ff7675;" onclick="settleAndReset()">SETTLE & CLEAR TOTAL</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="nav-work" class="nav-item active" onclick="showPage('work')">LOGS</button>
        <button id="nav-config" class="nav-item" onclick="showPage('config')">SETTINGS</button>
    </div>

<script>
    let records = JSON.parse(localStorage.getItem('workRecords')) || [];
    let lastSettleTime = parseInt(localStorage.getItem('lastSettleTime')) || 0;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
        renderAll();
    }

    function initMonthFilter() {
        const select = document.getElementById('monthFilter');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            select.add(new Option(`${d.getFullYear()} / ${d.getMonth() + 1}`, `${d.getFullYear()}-${d.getMonth() + 1}`));
        }
    }

    function addRecord() {
        const h = parseFloat(document.getElementById('dailyHour').value) || 0;
        const min = parseFloat(document.getElementById('dailyMin').value) || 0;
        const total = h + (min / 60);
        if (total <= 0) return;
        records.unshift({ id: Date.now(), year: new Date().getFullYear(), month: new Date().getMonth()+1, day: new Date().getDate(), hours: total });
        saveToStorage();
        document.getElementById('dailyHour').value = "";
        document.getElementById('dailyMin').value = "";
        renderAll();
    }

    // --- 關鍵修正：點擊日曆格子的邏輯 ---
    function handleCellClick(year, month, day) {
        const dayRecords = records.filter(r => r.year === year && r.month === month && r.day === day);
        
        if (dayRecords.length > 0) {
            // 如果只有一筆紀錄，直接修改
            if (dayRecords.length === 1) {
                const newVal = prompt(`修改 ${month}/${day} 的時數：`, dayRecords[0].hours.toFixed(1));
                if (newVal !== null && !isNaN(newVal) && newVal !== "") {
                    dayRecords[0].hours = parseFloat(newVal);
                    saveToStorage();
                    renderAll();
                }
            } else {
                // 如果有多筆紀錄，捲動到下方列表讓使用者選
                alert(`當天有多筆紀錄，請從下方清單點擊文字進行修改。`);
                showDayDetail(year, month, day);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        } else {
            // 空白日期，直接補記
            const val = prompt(`補記 ${month}/${day} 的時數：`);
            if(val !== null && !isNaN(val) && val !== "") {
                records.unshift({ id: Date.now(), year, month, day, hours: parseFloat(val) });
                saveToStorage();
                renderAll();
            }
        }
    }

    function deleteRecord(id) {
        if(confirm("確定刪除？")) {
            records = records.filter(r => r.id !== id);
            saveToStorage();
            renderAll();
        }
    }

    function editRecord(id) {
        const record = records.find(r => r.id === id);
        const newVal = prompt(`修改時數：`, record.hours.toFixed(1));
        if (newVal !== null && !isNaN(newVal) && newVal !== "") {
            record.hours = parseFloat(newVal);
            saveToStorage();
            renderAll();
        }
    }

    function saveToStorage() {
        localStorage.setItem('workRecords', JSON.stringify(records));
        localStorage.setItem('workGoal', document.getElementById('goalInput').value);
    }

    function renderAll() {
        const goal = parseFloat(document.getElementById('goalInput').value) || 38;
        const [year, month] = document.getElementById('monthFilter').value.split('-').map(Number);
        
        let sessionTotal = 0;
        records.forEach(r => { if (r.id >= lastSettleTime) sessionTotal += r.hours; });
        document.getElementById('sessionTotal').innerText = sessionTotal.toFixed(1);
        document.getElementById('sessionGap').innerText = Math.max(0, goal - sessionTotal).toFixed(1);

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(w => {
            const h = document.createElement('div'); h.className = 'calendar-day-head'; h.innerText = w;
            grid.appendChild(h);
        });

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        
        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div'); cell.className = 'calendar-cell';
            const dayRecords = records.filter(r => r.year === year && r.month === month && r.day === i);
            if (dayRecords.length > 0) {
                cell.classList.add('has-data');
                const sum = dayRecords.reduce((s, r) => s + r.hours, 0);
                cell.innerHTML = `<span>${i}</span><div class="work-label">${sum.toFixed(1)}h</div>`;
            } else { cell.innerHTML = `<span>${i}</span>`; }
            
            cell.onclick = () => {
                handleCellClick(year, month, i);
                showDayDetail(year, month, i);
            };
            grid.appendChild(cell);
        }
    }

    function showDayDetail(y, m, d) {
        const dayRecords = records.filter(r => r.year === y && r.month === m && r.day === d);
        const detailDiv = document.getElementById('dayDetail');
        if (dayRecords.length === 0) { detailDiv.innerHTML = ""; return; }
        
        detailDiv.innerHTML = `<div style="font-weight:900; margin-bottom:10px;">📍 ${m}/${d} DETAILS:</div>`;
        dayRecords.forEach(r => {
            const item = document.createElement('div');
            item.className = 'record-item';
            item.innerHTML = `
                <span onclick="editRecord(${r.id})">🕒 ${r.hours.toFixed(1)} hrs (Tap to edit)</span>
                <button class="btn-del" onclick="deleteRecord(${r.id})">DEL</button>
            `;
            detailDiv.appendChild(item);
        });
    }

    // 結算、匯出匯入功能保持不變...
    function settleAndReset() {
        if (confirm("結算將使本期累計歸零，確定嗎？")) {
            lastSettleTime = Date.now();
            localStorage.setItem('lastSettleTime', lastSettleTime);
            renderAll();
        }
    }
    function exportData() {
        const data = { records, lastSettleTime, goal: document.getElementById('goalInput').value };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `WORK_BACKUP_${new Date().toISOString().slice(0,10)}.json`; a.click();
    }
    function importData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            records = data.records || []; lastSettleTime = data.lastSettleTime || 0;
            document.getElementById('goalInput').value = data.goal || 38;
            saveToStorage(); renderAll(); alert("Restored!");
        };
        reader.readAsText(file);
    }

    initMonthFilter();
    if(localStorage.getItem('workGoal')) document.getElementById('goalInput').value = localStorage.getItem('workGoal');
    renderAll();
</script>
</body>
</html>
